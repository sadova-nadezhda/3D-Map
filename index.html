<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive City Map</title>
  </head>
  <body>
    <div id="app">
      <div id="scene-container"></div>
      <div id="labels-root"></div>

      <div id="hintCard" class="hint-card" hidden>
        <div class="hint-card__content">
          <div class="hint-card__title" id="hintTitle"></div>
          <div class="hint-card__text" id="hintText"></div>
        </div>
      </div>

      <div id="previewCard" class="preview-card" hidden>
        <button id="previewClose" class="preview-card__close" type="button" aria-label="Закрыть">
          ×
        </button>

        <div class="preview-card__image-wrap">
          <img id="previewImage" class="preview-card__image" src="" alt="" />
        </div>

        <div class="preview-card__body">
          <h3 id="previewTitle" class="preview-card__title"></h3>
          <p id="previewText" class="preview-card__text"></p>
          <button id="previewMore" class="preview-card__button" type="button">
            Подробнее
          </button>
        </div>
      </div>

      <div id="modalOverlay" class="modal-overlay" hidden>
        <div class="modal modal--wide" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
          <button id="closeModal" class="modal__close" type="button" aria-label="Закрыть">
            ×
          </button>

          <div class="modal__media">
            <img id="modalImage" class="modal__image" src="" alt="" />
          </div>

          <div class="modal__content">
            <h2 id="modalTitle"></h2>
            <p id="modalDescription"></p>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
